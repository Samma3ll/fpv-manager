# Development overrides for hot reload and faster iteration
# This file is automatically merged with docker-compose.yml when using `docker compose up`

services:
  backend:
    # Override command to enable auto-reload
    # The entrypoint already runs migrations, here we just pass --reload
    command: 
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "--reload"
    environment:
      ENVIRONMENT: development
      DEBUG: "True"

  frontend:
    # Use development Dockerfile for Vite dev server with hot reload
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    command: npm run dev
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
